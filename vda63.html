<!DOCTYPE html>
<html lang="tr" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VDA 6.3 Süreç Denetimi — Analiz Aracı</title>
<link rel="icon" type="image/png" href="VDA_AnalysisTool63Logo.png">
<link rel="apple-touch-icon" href="VDA_AnalysisTool63Logo.png">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/exceljs/4.4.0/exceljs.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<style>
:root{
  --bg:#0d1117; --bg2:#090c10; --card:#161b22; --bg3:#121821;
  --border:#30363d; --text:#e6edf3; --muted:#8b949e;
  --primary:#0a6e4f; --primary2:#0d8a63; --blue:#0288d1;
  --green:#2e9e5b; --orange:#fb8c00; --red:#e53935; --yellow:#fbc02d;
  --A:#2e9e5b; --B:#f9a825; --C:#e53935;
}
[data-theme="light"]{
  --bg:#eef3f0; --bg2:#e3ebe6; --card:#ffffff; --bg3:#f1f6f3;
  --border:#cbd8d0; --text:#16221c; --muted:#5b6b62;
  --primary:#0a6e4f; --primary2:#0c7f5a; --blue:#0b79c9;
  --green:#2e7d32; --orange:#ef6c00; --red:#d32f2f; --yellow:#f9a825;
  --A:#2e7d32; --B:#ef9d00; --C:#d32f2f;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'Segoe UI',system-ui,sans-serif;min-height:100vh;font-size:14px}
button{font-family:inherit;cursor:pointer}
input,select,textarea{font-family:inherit}
a{color:var(--blue)}

/* Topbar */
.topbar{position:sticky;top:0;z-index:50;display:flex;align-items:center;gap:.5rem;flex-wrap:wrap;
  padding:.55rem 1rem;background:linear-gradient(135deg,var(--primary),var(--primary2));color:#fff;box-shadow:0 2px 10px rgba(0,0,0,.25)}
.brand{font-weight:700;font-size:1.02rem;display:flex;align-items:center;gap:.5rem;margin-right:.3rem}
.brand .logo{background:#fff;color:var(--primary);border-radius:6px;padding:.15rem .4rem;font-weight:800;letter-spacing:.5px;font-size:.85rem}
.brand-logo{height:42px;width:auto;display:block;border-radius:6px;background:#fff;padding:2px}
.brand small{font-weight:400;opacity:.8;font-size:.68rem;display:block}
.spacer{flex:1}
.btn{border:none;border-radius:7px;padding:.42rem .68rem;font-size:.78rem;font-weight:600;display:inline-flex;align-items:center;gap:.35rem;transition:.15s;background:rgba(255,255,255,.14);color:#fff}
.btn:hover{background:rgba(255,255,255,.26)}
.btn-light{background:#fff;color:var(--primary)}
.btn-light:hover{filter:brightness(.95)}
.sync-badge{font-size:.72rem;background:rgba(255,255,255,.14);padding:.3rem .55rem;border-radius:20px;display:inline-flex;align-items:center;gap:.35rem}
.rep-sel{background:rgba(255,255,255,.16);color:#fff;border:1px solid rgba(255,255,255,.3);border-radius:7px;padding:.4rem .5rem;font-size:.8rem;max-width:260px}
.rep-sel option{color:#111}

/* Tabs */
.tabs{display:flex;gap:.2rem;background:var(--bg2);padding:.4rem 1rem 0;border-bottom:1px solid var(--border);position:sticky;top:50px;z-index:40;flex-wrap:wrap}
.tab{padding:.55rem .9rem;font-size:.84rem;font-weight:600;color:var(--muted);border:1px solid transparent;border-bottom:none;border-radius:8px 8px 0 0;background:transparent}
.tab.active{color:var(--text);background:var(--card);border-color:var(--border)}
.tab .ct{display:inline-block;min-width:18px;text-align:center;font-size:.66rem;background:var(--border);border-radius:10px;padding:0 .3rem;margin-left:.3rem;color:var(--text)}

.wrap{padding:1.1rem 1.1rem 5rem;max-width:1180px;margin:0 auto}
.wrap.wide{max-width:none;padding-left:1.4rem;padding-right:1.4rem}
.sec-title{font-size:1.05rem;font-weight:700;margin:.2rem 0 1rem;padding-bottom:.5rem;border-bottom:2px solid var(--primary);color:var(--primary2)}
[data-theme="light"] .sec-title{color:var(--primary)}

/* Header form */
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:.9rem 1.4rem}
@media(max-width:720px){.grid2{grid-template-columns:1fr}}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:.6rem 1rem;margin-top:.5rem}
@media(max-width:720px){.grid3{grid-template-columns:1fr}}
.fld{display:flex;flex-direction:column;gap:.25rem}
.fld label{font-size:.7rem;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:.03em}
.fld input,.fld textarea,.fld select{background:var(--card);border:1px solid var(--border);color:var(--text);border-radius:7px;padding:.5rem .6rem;font-size:.85rem;width:100%}
.fld textarea{resize:vertical;min-height:60px}

/* Element / question cards */
.el-head{display:flex;align-items:center;gap:.6rem;margin:1.4rem 0 .4rem;user-select:none;flex-wrap:wrap;border-bottom:2px solid var(--primary);padding-bottom:.4rem}
.el-head .badge{background:var(--primary);color:#fff;font-weight:700;border-radius:7px;padding:.3rem .6rem;font-size:.85rem;min-width:48px;text-align:center}
.el-head .nm{font-size:1rem;font-weight:700}
.el-head .pct{margin-left:auto;font-weight:700;font-size:.92rem;padding:.25rem .6rem;border-radius:20px;background:var(--bg3);border:1px solid var(--border)}
.el-head .el-toggle{background:none;border:none;color:var(--muted);font-size:.85rem;cursor:pointer;padding:.1rem .25rem;line-height:1}
.el-head.excluded{opacity:.65;border-bottom-color:var(--border)}
.el-head.excluded .nm{text-decoration:line-through}
.excl-tag{margin-left:auto;background:var(--C);color:#fff;font-weight:700;font-size:.74rem;padding:.2rem .55rem;border-radius:20px}
.el-actions{display:flex;gap:.35rem;flex-wrap:wrap}
.elbtn{background:var(--bg3);border:1px solid var(--border);color:var(--text);border-radius:6px;padding:.28rem .55rem;font-size:.74rem;font-weight:600;cursor:pointer}
.elbtn:hover{border-color:var(--primary)}
.elbtn.excl{color:var(--C);border-color:var(--C)}
.elbtn.add{background:var(--A);color:#fff;border-color:var(--A)}
.el-sum{font-size:.78rem;color:var(--text);margin:0 0 .6rem;padding-left:.4rem;font-variant-numeric:tabular-nums;font-weight:700}
.el-sum.warn{color:var(--C)}
.el-sum .muted{font-weight:400}
.sub-head{font-weight:700;color:var(--primary2);margin:.9rem 0 .3rem;font-size:.9rem;display:flex;align-items:center;gap:.5rem}
[data-theme="light"] .sub-head{color:var(--primary)}
.sub-head .spct{margin-left:auto;font-size:.78rem;color:var(--muted);font-weight:600}

.q{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:.7rem .8rem;margin-bottom:.6rem}
.q .qtop{display:flex;gap:.6rem;align-items:flex-start}
.q .qno{font-weight:700;color:var(--primary2);font-size:.82rem;min-width:46px;padding-top:.15rem}
[data-theme="light"] .q .qno{color:var(--primary)}
.q .qtxt{flex:1;border:1px dashed transparent;border-radius:6px;padding:.15rem .3rem;font-size:.9rem;line-height:1.4;outline:none}
.q .qtxt:focus,.q .qtxt:hover{border-color:var(--border);background:var(--bg3)}
.q .star{color:var(--orange);font-weight:800;cursor:pointer;font-size:.95rem}
.score{display:flex;gap:.3rem;margin-top:.55rem;flex-wrap:wrap;align-items:center}
/* P6 çoklu süreç-adımı puanlama */
.p6score{margin-top:.55rem;border:1px dashed var(--border);border-radius:9px;padding:.4rem .55rem;background:var(--bg2)}
.p6row{display:flex;align-items:center;gap:.6rem;flex-wrap:wrap;margin:.15rem 0}
.p6row .score{margin-top:0}
.p6lbl{min-width:150px;font-size:.8rem;font-weight:700;color:var(--primary2);flex:0 0 auto}
.p6avg-lbl{font-size:.78rem;margin-top:.35rem;color:var(--muted)}
.pstep-bar{display:flex;align-items:center;gap:.5rem;flex-wrap:wrap;margin:.2rem 0 .7rem;padding:.45rem .55rem;background:var(--bg2);border:1px solid var(--border);border-radius:9px}
.pstep-h{font-size:.78rem;font-weight:700;color:var(--primary2);flex:1 1 100%}
.pstep-chip{display:inline-flex;align-items:center;gap:.2rem;background:var(--bg3);border:1px solid var(--border);border-radius:7px;padding:.1rem .25rem}
.pstep-chip input{border:none;background:transparent;color:var(--text);font-size:.8rem;font-weight:600}
.p6grid th,.p6grid td{text-align:center;white-space:nowrap}
.p6avg-row td{background:var(--bg2);border-top:2px solid var(--primary2)}
.sbtn{border:1px solid var(--border);background:var(--bg3);color:var(--text);border-radius:7px;width:40px;height:34px;font-weight:700;font-size:.85rem}
.sbtn.nb{width:auto;padding:0 .55rem;font-size:.78rem}
.sbtn[data-v="0"].on{background:var(--C);border-color:var(--C);color:#fff}
.sbtn[data-v="4"].on{background:#e06b1f;border-color:#e06b1f;color:#fff}
.sbtn[data-v="6"].on{background:var(--yellow);border-color:var(--yellow);color:#222}
.sbtn[data-v="8"].on{background:#7cb342;border-color:#7cb342;color:#fff}
.sbtn[data-v="10"].on{background:var(--A);border-color:var(--A);color:#fff}
.sbtn.nb.on{background:var(--muted);border-color:var(--muted);color:#fff}
/* Potansiyel Analizi: trafik ışığı butonları */
.potscore{gap:.45rem}
.potbtn{border:1px solid var(--border);background:var(--bg3);color:var(--text);border-radius:8px;padding:.42rem .9rem;font-weight:700;font-size:.82rem}
.potbtn[data-c="kirmizi"].on{background:var(--C);border-color:var(--C);color:#fff}
.potbtn[data-c="sari"].on{background:var(--yellow);border-color:var(--yellow);color:#222}
.potbtn[data-c="yesil"].on{background:var(--A);border-color:var(--A);color:#fff}
.potbtn[data-c="nb"].on{background:var(--muted);border-color:var(--muted);color:#fff}
.q .reqbox{margin-top:.55rem;border:1px solid var(--border);border-radius:8px;background:var(--bg3);overflow:hidden}
.q .reqbox>summary{cursor:pointer;list-style:none;padding:.4rem .6rem;font-size:.76rem;font-weight:600;color:var(--primary2);user-select:none;display:flex;align-items:center;gap:.4rem}
[data-theme="light"] .q .reqbox>summary{color:var(--primary)}
.q .reqbox>summary::-webkit-details-marker{display:none}
.q .reqbox>summary::before{content:'▸';transition:.15s;font-size:.7rem}
.q .reqbox[open]>summary::before{transform:rotate(90deg)}
.q .reqs{font-size:.79rem;color:var(--text);padding:.5rem .7rem;outline:none;white-space:pre-wrap;border-top:1px solid var(--border);min-height:1.6rem}
.q .reqs:empty:before{content:attr(data-ph);color:var(--muted)}
.q .reqs:focus{background:var(--card)}
.desc-cols{display:grid;grid-template-columns:1fr 1fr;gap:.4rem 1.4rem;padding:.55rem .7rem;border-top:1px solid var(--border)}
@media(max-width:680px){.desc-cols{grid-template-columns:1fr}}
.desc-col .desc-h{font-weight:800;color:var(--text);font-size:.78rem;margin-bottom:.4rem;text-decoration:underline;text-underline-offset:3px}
.desc-col .desc-body{white-space:pre-wrap;font-size:.79rem;color:var(--text);line-height:1.5}
.q .note{margin-top:.5rem;width:100%;background:var(--bg3);border:1px solid var(--border);color:var(--text);border-radius:7px;padding:.4rem .5rem;font-size:.82rem;resize:vertical;min-height:38px}
.q .nlbl{font-size:.68rem;color:var(--muted);text-transform:uppercase;letter-spacing:.03em;margin-top:.5rem}
.muted{color:var(--muted)}
.toggle-min{font-size:.74rem}
/* Bulgular / Dahili yorumlar */
.qsec{margin-top:.6rem;border-top:1px dashed var(--border);padding-top:.5rem}
.qsec-h{display:flex;align-items:center;gap:.5rem;font-size:.78rem;font-weight:700;color:var(--primary2);margin-bottom:.35rem}
[data-theme="light"] .qsec-h{color:var(--primary)}
.qsec-h .addbtn{margin-left:auto;background:var(--primary);color:#fff;border:none;border-radius:6px;padding:.25rem .55rem;font-size:.74rem;font-weight:600;cursor:pointer}
.qsec-h .addbtn:hover{background:var(--primary2)}
.qrow{display:flex;gap:.4rem;align-items:flex-start;margin-bottom:.4rem}
.qrow .note{margin-top:0}
.cmt-status{display:flex;flex-direction:column;gap:.2rem;font-size:.74rem;min-width:78px;padding-top:.2rem}
.cmt-status label{display:flex;align-items:center;gap:.25rem;cursor:pointer;color:var(--muted)}
.cmt-status label.on{color:var(--A);font-weight:700}
.cmt-status label.bad{color:var(--C);font-weight:700}
.delx{background:var(--bg3);border:1px solid var(--border);color:var(--C);border-radius:6px;padding:.3rem .45rem;font-size:.8rem;cursor:pointer;flex-shrink:0}
.img-grid{display:flex;flex-wrap:wrap;gap:.5rem}
.img-th{position:relative;width:96px}
.img-th img{width:96px;height:72px;object-fit:cover;border-radius:7px;border:1px solid var(--border);background:var(--bg3);display:block}
.img-act{display:flex;gap:.2rem;margin-top:.2rem;justify-content:center}
.img-act .icon-btn{padding:.15rem .35rem;font-size:.74rem;text-decoration:none}
.file-th{width:96px;height:72px;border-radius:7px;border:1px solid var(--border);background:var(--bg3);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:.2rem;text-decoration:none;padding:.3rem;overflow:hidden}
.file-th .file-ic{font-size:1.6rem;line-height:1}
.file-th .file-nm{font-size:.64rem;color:var(--text);text-align:center;width:100%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
/* Aksiyon planı: ≤8 puanlı sorular */
.ro{background:var(--bg3);border:1px solid var(--border);border-radius:7px;padding:.5rem .6rem;font-size:.85rem;min-height:2.1rem;white-space:pre-wrap}
.aq{background:var(--card);border:1px solid var(--border);border-radius:9px;margin-bottom:.5rem;overflow:hidden}
.aq>summary{cursor:pointer;list-style:none;display:flex;align-items:center;gap:.6rem;padding:.6rem .8rem;flex-wrap:wrap}
.aq>summary::-webkit-details-marker{display:none}
.aq>summary::before{content:'▸';color:var(--muted);font-size:.75rem;transition:.15s}
.aq[open]>summary::before{transform:rotate(90deg)}
.aq-id{font-weight:800;color:var(--primary2);min-width:46px}
[data-theme="light"] .aq-id{color:var(--primary)}
.aq-t{flex:1;min-width:200px;font-size:.88rem}
.aq-ref{font-size:.76rem;color:var(--muted)}
.aq-score{display:inline-flex;align-items:center;gap:.4rem;font-size:.82rem;white-space:nowrap}
.sbox{width:16px;height:16px;border-radius:4px;display:inline-block;border:1px solid rgba(0,0,0,.15)}
.aq-body{padding:0 .8rem .7rem;border-top:1px dashed var(--border)}
/* İmza kutuları */
.sign-grid{display:grid;grid-template-columns:1fr 1fr;gap:1rem}
@media(max-width:680px){.sign-grid{grid-template-columns:1fr}}
.sign-box{border-bottom:1px dashed var(--border);padding-bottom:.6rem}
.sign-name{font-weight:700;margin-bottom:.4rem}
.sign-img{display:inline-block;position:relative}
.sign-img img{max-height:90px;max-width:240px;border:1px solid var(--border);border-radius:7px;background:#fff;display:block}
/* Görünüm geçişi (yatay/sekme) */
.vtog{display:inline-flex;border:1px solid var(--border);border-radius:7px;overflow:hidden}
.vtog button{background:var(--card);color:var(--muted);border:none;padding:.35rem .6rem;font-size:.76rem;font-weight:600;cursor:pointer}
.vtog button.on{background:var(--primary);color:#fff}
/* Soru sekmeleri (P2,P3,…,P6-6.1,…) */
.qtabs{display:flex;flex-wrap:wrap;gap:.25rem;margin:.2rem 0 1rem;border-bottom:2px solid var(--primary);padding-bottom:.4rem}
.qtab{background:var(--bg3);color:var(--text);border:1px solid var(--border);border-radius:7px;padding:.35rem .7rem;font-size:.82rem;font-weight:700;cursor:pointer}
.qtab.active{background:var(--primary);color:#fff;border-color:var(--primary)}
.qtab.excl{opacity:.5;text-decoration:line-through}

/* Değerlendirme matrisi */
.mx-grid{display:grid;grid-template-columns:1.15fr 1fr;gap:1rem}
@media(max-width:820px){.mx-grid{grid-template-columns:1fr}}
.mx-h{font-weight:700;color:var(--primary2);margin-bottom:.6rem;font-size:.92rem}
[data-theme="light"] .mx-h{color:var(--primary)}
.mx-cls{display:inline-block;min-width:26px;text-align:center;color:#fff;font-weight:800;border-radius:5px;padding:.05rem .35rem;font-size:.8rem}
.mx-mon td{font-size:.78rem}
.mx-mon th{font-size:.72rem;text-align:left;color:var(--primary2)}
.mx-mon tr.dg-hit td{background:rgba(229,57,53,.08)}
.mx-mon tr.dg-final td{font-weight:800;border-top:2px solid var(--primary2)}
.mx-excl{opacity:.6}
.mx-excl .muted{font-style:italic}

/* Result */
.result-top{display:grid;grid-template-columns:1.1fr 1fr;gap:1rem;margin-bottom:1.2rem}
@media(max-width:760px){.result-top{grid-template-columns:1fr}}
.card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:1rem 1.1rem}
.gauge{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:.5rem}
.cls-big{font-size:3.2rem;font-weight:800;line-height:1;width:110px;height:110px;border-radius:50%;display:flex;align-items:center;justify-content:center;color:#fff}
.eg-num{font-size:2rem;font-weight:800}
.matrix{width:100%;border-collapse:collapse;font-size:.84rem}
.matrix th,.matrix td{border:1px solid var(--border);padding:.45rem .6rem;text-align:left}
.matrix th{background:var(--bg3);font-size:.74rem;text-transform:uppercase;letter-spacing:.03em;color:var(--muted)}
.matrix td.r{text-align:right;font-variant-numeric:tabular-nums}
.bar{height:9px;border-radius:6px;background:var(--bg3);overflow:hidden;min-width:80px}
.bar>span{display:block;height:100%}
.pill{font-weight:700;border-radius:6px;padding:.1rem .45rem;font-size:.78rem;color:#fff}
.notes-warn{background:rgba(229,57,53,.08);border:1px solid var(--C);color:var(--C);border-radius:8px;padding:.5rem .7rem;font-size:.82rem;margin-top:.5rem}
[data-theme="light"] .notes-warn{background:rgba(211,47,47,.06)}

/* Action plan */
.ap-table{width:100%;border-collapse:collapse;font-size:.84rem}
.ap-table th,.ap-table td{border:1px solid var(--border);padding:.3rem .4rem;vertical-align:top}
.ap-table th{background:var(--bg3);font-size:.72rem;text-transform:uppercase;color:var(--muted)}
.ap-table input,.ap-table select,.ap-table textarea{width:100%;background:transparent;border:none;color:var(--text);font-size:.82rem;resize:vertical}
.ap-table textarea{min-height:30px}
.st{font-weight:700;border-radius:6px;padding:.1rem .4rem;font-size:.74rem;color:#fff}

/* Modal */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.5);display:none;align-items:center;justify-content:center;z-index:100;padding:1rem}
.modal-bg.show{display:flex}
.modal{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:1.3rem;max-width:520px;width:100%;max-height:90vh;overflow:auto}
.modal.wide{max-width:820px}
.modal h3{margin-bottom:.9rem;color:var(--primary2)}
[data-theme="light"] .modal h3{color:var(--primary)}
.modal .fld{margin-bottom:.8rem}
.modal-actions{display:flex;gap:.5rem;justify-content:flex-end;margin-top:1rem}
.hint{font-size:.74rem;color:var(--muted);margin-top:.4rem;line-height:1.4}
.choice{display:flex;gap:.6rem;margin:.5rem 0}
.choice button{flex:1;border:1px solid var(--border);background:var(--bg3);color:var(--text);border-radius:9px;padding:.7rem;font-weight:600;text-align:left}
.choice button:hover{border-color:var(--primary)}
.choice button.sel{border-color:var(--primary);background:rgba(13,138,99,.12)}

/* toast */
#toast{position:fixed;bottom:1.2rem;left:50%;transform:translateX(-50%);z-index:200;display:flex;flex-direction:column;gap:.4rem;align-items:center}
.tmsg{background:var(--card);border:1px solid var(--border);border-left:4px solid var(--primary);border-radius:8px;padding:.55rem .9rem;font-size:.84rem;box-shadow:0 4px 16px rgba(0,0,0,.3);animation:fade .3s}
.tmsg.err{border-left-color:var(--C)} .tmsg.ok{border-left-color:var(--A)}
@keyframes fade{from{opacity:0;transform:translateY(8px)}}

.empty{text-align:center;color:var(--muted);padding:3rem 1rem}
.empty h2{font-weight:700;margin-bottom:.5rem;color:var(--text)}
.list-row{display:flex;align-items:center;gap:.7rem;background:var(--card);border:1px solid var(--border);border-radius:9px;padding:.6rem .8rem;margin-bottom:.5rem}
.list-row .ln{font-weight:600}.list-row .lt{font-size:.72rem;color:var(--muted)}
.list-row .tag{font-size:.68rem;font-weight:700;padding:.1rem .4rem;border-radius:5px;background:var(--bg3);border:1px solid var(--border)}
.list-row.open{border-color:var(--primary);box-shadow:0 0 0 1px var(--primary) inset}
.icon-btn{background:var(--bg3);border:1px solid var(--border);color:var(--text);border-radius:6px;padding:.3rem .5rem;font-size:.78rem}

/* Home dashboard */
.home-title{font-size:1.4rem;font-weight:800;color:var(--primary2);margin:.2rem 0 1.2rem}
[data-theme="light"] .home-title{color:var(--primary)}
.home-grid{display:grid;grid-template-columns:1fr 1fr;gap:1.1rem}
@media(max-width:760px){.home-grid{grid-template-columns:1fr}}
.home-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:1rem 1.1rem}
.home-card-h{display:flex;align-items:center;gap:.6rem;font-weight:700;font-size:1rem;color:var(--text);padding-bottom:.6rem;margin-bottom:.4rem;border-bottom:2px solid var(--primary)}
.home-card-h .ct{margin-left:auto;background:var(--primary);color:#fff;border-radius:20px;padding:.05rem .55rem;font-size:.8rem}
.cat-badge,.st-badge{color:#fff;font-weight:700;font-size:.72rem;padding:.15rem .5rem;border-radius:20px;white-space:nowrap;display:inline-block}
/* Plan sütun seçici (çoklu) */
.col-pick{position:relative;display:inline-block}
.col-pick>summary{cursor:pointer;list-style:none;background:var(--bg3);border:1px solid var(--border);color:var(--text);border-radius:7px;padding:.42rem .68rem;font-size:.78rem;font-weight:600}
.col-pick>summary::-webkit-details-marker{display:none}
.col-pick[open]>summary{border-color:var(--primary)}
.col-pick-menu{position:absolute;z-index:30;margin-top:.3rem;background:var(--card);border:1px solid var(--border);border-radius:9px;padding:.5rem .6rem;box-shadow:0 6px 18px rgba(0,0,0,.25);min-width:180px;display:flex;flex-direction:column;gap:.3rem}
.col-pick-menu label{display:flex;align-items:center;gap:.45rem;font-size:.82rem;cursor:pointer;white-space:nowrap}
/* Risk puanlama eşik editörü */
.rule-grid{display:grid;grid-template-columns:1fr 1fr;gap:.8rem;margin-top:.6rem}
@media(max-width:680px){.rule-grid{grid-template-columns:1fr}}
.rule-box{background:var(--bg3);border:1px solid var(--border);border-radius:9px;padding:.6rem .7rem}
.rule-box .rule-h{font-weight:700;font-size:.8rem;color:var(--primary2);margin-bottom:.4rem}
[data-theme="light"] .rule-box .rule-h{color:var(--primary)}
.rule-tbl{width:100%;font-size:.8rem}
.rule-tbl td{padding:.12rem .2rem}
.rule-tbl input{width:62px;background:var(--card);border:1px solid var(--border);color:var(--text);border-radius:5px;padding:.2rem .3rem;font-size:.8rem}
.rule-box .addbtn{margin-top:.3rem;background:var(--primary);color:#fff;border:none;border-radius:6px;padding:.2rem .5rem;font-size:.72rem;font-weight:600;cursor:pointer}
/* Risk tablosu kompakt görünüm (yatay kaydırmayı azaltır) */
.risk-tbl th,.risk-tbl td{padding:.22rem .28rem;font-size:.8rem}
.risk-tbl td input[type=number]{width:46px !important;padding:.18rem .2rem}
.risk-tbl td input:not([type]){min-width:110px}
.risk-tbl td input[type=checkbox]{margin:0}
.risk-tbl .muted{font-size:.64rem !important}
.reco-badge{display:inline-block;min-width:52px;text-align:center;font-weight:700;font-size:.68rem;padding:.12rem .35rem;border-radius:20px;vertical-align:middle}

/* Print */
@media print{
  *{-webkit-print-color-adjust:exact !important;print-color-adjust:exact !important} /* arka plan renkleri/rozetler bassın */
  .topbar,.tabs,.no-print,#toast,.modal-bg{display:none !important}
  body{background:#fff;color:#000;font-size:11px}
  .wrap{max-width:none;padding:0}
  .q,.card{break-inside:avoid;border-color:#999}
  .el-head{break-after:avoid}
  .print-only{display:block !important}
  .qtxt,.reqs{color:#000 !important}
  /* Risk matrisi PDF: yatay sayfa + tabloyu tam genişliğe sığdır */
  .risk-wrap{page:riskland;overflow:visible !important}
  .risk-tbl{min-width:0 !important;width:100% !important;font-size:8px;table-layout:auto}
  .risk-tbl th,.risk-tbl td{padding:2px 3px !important;white-space:normal}
  .risk-tbl input{border:none !important;background:transparent !important;width:auto !important;max-width:34px;font-size:8px;padding:0;-webkit-appearance:none;appearance:none}
  /* Birleşik PDF: yalnızca #printArea bas, ekran görünümünü gizle */
  body.doc-print #view,body.doc-print #tabs{display:none !important}
  body.doc-print #printArea{display:block !important}
  #printArea .pr-sec{margin:0 0 1.1rem}
  #printArea .pr-break{break-before:page}
  #printArea .pr-h{font-size:15px;color:#0a6e4f;border-bottom:2px solid #0a6e4f;padding-bottom:3px;margin:0 0 .5rem}
  #printArea .pr-el{font-size:12.5px;background:#0a6e4f;color:#fff;padding:3px 6px;margin:.7rem 0 .3rem;break-after:avoid}
  #printArea .pr-sub{font-weight:700;color:#0a6e4f;margin:.45rem 0 .2rem;font-size:11px}
  #printArea .pr-q{break-inside:avoid;border:1px solid #ccc;border-radius:5px;padding:4px 6px;margin:.25rem 0}
  #printArea .pr-qtop{display:flex;gap:6px;align-items:flex-start}
  #printArea .pr-qid{font-weight:800;min-width:42px}
  #printArea .pr-qt{flex:1}
  #printArea .pr-qs{font-weight:800;padding:1px 7px;border-radius:4px;border:1px solid #999;white-space:nowrap}
  #printArea .pr-steps{font-size:10px;color:#333;margin:.2rem 0 0 48px}
  #printArea .pr-desc{font-size:10px;color:#333;margin:.25rem 0 0 48px}
  #printArea .pr-find,#printArea .pr-cmt{font-size:10px;margin:.2rem 0 0 48px}
  #printArea .pr-find ul,#printArea .pr-cmt ul{margin:.1rem 0 0 1rem;padding:0}
  #printArea .pr-imgs{display:grid;gap:5px;margin:.3rem 0 0 48px}
  #printArea .pr-imgs img{width:100%;border:1px solid #ccc;border-radius:4px}
  #printArea .pr-file{font-size:10px;border:1px solid #ccc;border-radius:4px;padding:3px}
  #printArea .pr-tbl{width:100%;border-collapse:collapse;font-size:10.5px}
  #printArea .pr-tbl th,#printArea .pr-tbl td{border:1px solid #bbb;padding:3px 6px;text-align:left;vertical-align:top}
  #printArea .pr-tbl th{background:#0a6e4f;color:#fff;font-weight:700}
  #printArea .pr-act{font-size:8.5px;table-layout:fixed}
  #printArea .pr-act td,#printArea .pr-act th{padding:2px 3px;word-break:break-word}
  /* Aksiyon planı blok-form (resmi düzen) */
  #printArea .ap-block{border:1px solid #999;border-radius:3px;margin:.5rem 0;break-inside:avoid}
  #printArea .ap-qhead{display:flex;gap:8px;align-items:baseline;background:#eef4f1;border-bottom:1px solid #999;padding:3px 6px}
  #printArea .ap-qid{font-weight:800;min-width:42px}
  #printArea .ap-qt{flex:1;font-weight:600}
  #printArea .ap-pts{font-weight:800;white-space:nowrap}
  #printArea .ap-row{display:flex;border-bottom:1px solid #ddd}
  #printArea .ap-lbl{width:120px;flex:0 0 120px;font-weight:700;background:#f6f8f7;padding:3px 6px;border-right:1px solid #ddd}
  #printArea .ap-val{flex:1;padding:3px 6px;min-height:14px}
  #printArea .ap-row3{display:grid;grid-template-columns:1fr 1fr 1fr}
  #printArea .ap-row3>div{padding:3px 6px;border-right:1px solid #ddd}
  #printArea .ap-row3>div:last-child{border-right:none}
  /* Üst şerit (logo + başlık + No/Tarih) */
  #printArea .pr-bar{display:flex;align-items:center;gap:12px;border-bottom:2px solid #0a6e4f;padding-bottom:6px;margin-bottom:10px}
  #printArea .pr-logo{height:34px;width:auto}
  #printArea .pr-bar-title{flex:1;font-size:15px;font-weight:800;color:#0a6e4f}
  #printArea .pr-bar-meta{border-collapse:collapse;font-size:9.5px}
  #printArea .pr-bar-meta th{background:transparent;color:#000;font-weight:700;text-align:left;border:none;padding:0 8px 0 0}
  #printArea .pr-bar-meta td{border:none;padding:0}
  /* Başlık alt başlığı + anahtar/değer tablosu (yeşil olmayan, resmi düzen) */
  #printArea .pr-sub2{font-size:11.5px;color:#0a6e4f;border-bottom:1px solid #0a6e4f;padding-bottom:2px;margin:.9rem 0 .35rem}
  #printArea .pr-kv th{background:#fff !important;color:#000;font-weight:700;width:22%}
  #printArea .pr-kv td{width:28%}
}
@page riskland{size:A4 landscape;margin:8mm}
.print-only{display:none}
#printArea{display:none}
/* Yazdırma Ayarları penceresi */
.pgrid{display:grid;grid-template-columns:1fr 1fr;gap:.6rem 1.4rem;margin:.4rem 0}

.pchk{display:flex;align-items:center;gap:.5rem;font-size:.86rem;padding:.28rem 0;cursor:pointer}
.pchk input[type=checkbox]{width:17px;height:17px;flex:0 0 auto}

function isPot(r){ return (r||rep) && (r||rep).type==='potansiyel'; }
const POT_ORDER=[['nb','Uygulanamaz'],['kirmizi','Kırmızı'],['sari','Sarı'],['yesil','Yeşil']];
const POT_BG={yesil:'var(--A)',sari:'var(--yellow)',kirmizi:'var(--C)',nb:'var(--muted)'};
const POT_LBL={yesil:'Yeşil',sari:'Sarı',kirmizi:'Kırmızı',nb:'Uygulanamaz'};
const POT_STATUS={yesil:'Onaylı tedarikçi',sari:'Şartlı onaylı tedarikçi',kirmizi:'Yasaklı tedarikçi',nb:'Uygulanamaz'};
// Sınıflandırma eşikleri (VDA potansiyel; düzenlenebilir): sarı ≤greenMax → Yeşil; sarı ≤yellowMax → Sarı; sarı >yellowMax veya 1+ kırmızı → Kırmızı
const POT_CFG_DEF={greenMax:6, yellowMax:12};
let _potcfg=Object.assign({}, POT_CFG_DEF, JSON.parse(localStorage.getItem('vda63_potcfg')||'{}'));
function savePotCfg(){ localStorage.setItem('vda63_potcfg',JSON.stringify(_potcfg)); }
function setPotCfg(k,v){ _potcfg[k]=Math.max(0,+v||0); savePotCfg(); render(); }
function resetPotCfg(){ _potcfg=Object.assign({},POT_CFG_DEF); savePotCfg(); render(); }
// Genel değerlendirme (VDA 6.3 PA): analiz eksikse (değerlendirilmemiş soru varsa) Uygulanamaz; tamamlanınca → 1+ kırmızı veya sarı>yellowMax → Kırmızı; sarı>greenMax → Sarı; aksi → Yeşil. n.b. (n.a.) sorular sayıma katılmaz.
function potClassify(p){
  if((p.yesil+p.sari+p.kirmizi)===0) return 'nb';   // hiç renkli değerlendirme yok
  if(p.unanswered>0) return 'nb';                     // ANALİZ EKSİK → sınıflandırılamaz (Uygulanamaz)
  if(p.kirmizi>=1 || p.sari>(_potcfg.yellowMax||12)) return 'kirmizi';
  if(p.sari>(_potcfg.greenMax||6)) return 'sari';
  return 'yesil';
}
function potCalc(r){
  let yesil=0,sari=0,kirmizi=0,nb=0,unanswered=0;
  allQuestions(r).forEach(({el,q})=>{ if(r.excluded[el.id]) return; const v=r.scores[q.id];
    if(v==null){ unanswered++; return; }
    if(v==='yesil')yesil++; else if(v==='sari')sari++; else if(v==='kirmizi')kirmizi++; else if(v==='nb')nb++;
  });
  const answered=yesil+sari+kirmizi;
  const p={yesil,sari,kirmizi,nb,answered,unanswered}; p.overall=potClassify(p);
  return p;
}

// PDF'i tarayıcıda (pdf.js) okuyup metne çevirir — içerik kullanıcının kendi belgesidir, sunucuya gitmez
const REQ_HEAD='Değerlendirme için geçerli asgari gereklilikler';
const EX_HEAD='Uygulamaya yönelik örnekler';
let pendingDescMap=null;
// satırdaki item'ları x'e göre birleştirir (kelime aralarını genişlikten korur)
function joinItems(items){ let line='',pe=null; items.sort((a,b)=>a.x-b.x).forEach(o=>{ if(pe!=null&&o.x-pe>1.2) line+=' '; line+=o.s; pe=o.x+(o.w||0); }); return line.replace(/[ \t]{2,}/g,' ').trim(); }
// PDF'i sütun-bilinçli okur: soru başlığı/skor satırı tam genişlik; içerik sol(asgari gereklilik)/sağ(örnek) olarak ayrılır
async function extractDescriptionsFromPdf(file){
  if(!window.pdfjsLib) throw new Error('pdf.js yüklenmedi');
  try{ pdfjsLib.GlobalWorkerOptions.workerSrc='https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js'; }catch(e){}
  const valid=catalogIdSet();
  const pdf=await pdfjsLib.getDocument({data:await file.arrayBuffer()}).promise;
  const map={}; let cur=null, mode='idle', reqs=[], exs=[];
  const skip=/^(Bulgular|Notlar|VDA|Sipariş|Rapor Tarihi|Denetlenen|Seite|Page|\d+\s*\/\s*\d+|\d+\s*$)/i;
  const scoreRow=/(^|\s)(Uygulan\s*amaz|Uygulanamaz)(\s|$)|0\s+4\s+6\s+8\s+10|Acil önlem|Kırmızı\s+sarı/i;
  const flush=()=>{ if(cur){ const parts=[]; if(reqs.length) parts.push(REQ_HEAD+'\n'+reqs.join('\n')); if(exs.length) parts.push(EX_HEAD+'\n'+exs.join('\n')); const t=parts.join('\n\n').trim(); if(t) map[cur]=t; } reqs=[]; exs=[]; };
  for(let p=1;p<=pdf.numPages;p++){
    const page=await pdf.getPage(p);
    const W=page.getViewport({scale:1}).width, midX=W*0.47;
    const tc=await page.getTextContent();
    const rows={};
    tc.items.forEach(it=>{ if(!it.str||!it.str.trim()) return; const y=Math.round(it.transform[5]); (rows[y]=rows[y]||[]).push({x:it.transform[4],w:it.width||0,s:it.str}); });
    const ys=Object.keys(rows).map(Number).sort((a,b)=>b-a); // üstten alta
    for(const y of ys){
      const items=rows[y];
      const full=joinItems(items);
      const qm=full.match(/^(\d\.\d(?:\.\d)?)\*?\s+\S/);
      if(qm && valid.has(qm[1])){ flush(); cur=qm[1]; mode='idle'; continue; } // yeni soru (çok satırlı başlık dahil)
      if(!cur) continue;
      if(new RegExp(REQ_HEAD.slice(0,18),'i').test(full) || new RegExp(EX_HEAD.slice(0,14),'i').test(full)){ mode='collect'; continue; } // sütun başlığı satırı
      if(scoreRow.test(full)){ mode='idle'; continue; } // skor satırı → içerik bitti
      if(mode!=='collect') continue; // soru metni devamı / boşluk
      if(skip.test(full)) continue; // sayfa başlığı/altbilgi
      const L=items.filter(o=>o.x<midX), R=items.filter(o=>o.x>=midX);
      const lt=joinItems(L), rt=joinItems(R);
      if(lt) reqs.push(lt);
      if(rt) exs.push(rt);
    }
  }
  flush();
  return map;
}
function descMapPreview(map){ return Object.keys(map).sort((a,b)=>a.localeCompare(b,undefined,{numeric:true})).map(id=>'['+id+']\n'+map[id]).join('\n\n'); }

  if(!file) return;

  stat.textContent='PDF okunuyor…';

function catalogIdSet(){ const s=new Set(); ['surec','potansiyel'].forEach(t=>CATALOG[t]&&CATALOG[t].elements.forEach(el=>el.subs.forEach(su=>su.qs.forEach(q=>s.add(q.id))))); return s; }
// Yapıştırılan/PDF metnini soru no'ya göre bölüp açıklama haritası üretir (içerik kullanıcının kendi belgesidir)
function parseDescriptions(txt, validIds){
  validIds=validIds||catalogIdSet();
  const lines=(txt||'').split(/\r?\n/);
  const skip=/^(Değerlendirme için|Uygulamaya yönelik|Uygulan\s*amaz|Uygulanamaz|Acil önlem|Bulgular|Kırmızı|sarı|yeşil|Notlar|VDA|Sipariş|Rapor Tarihi|P\d\.\s)/i;
  const scoreRow=/^\s*(0\s+4\s+6\s+8\s+10|Uygulanamaz|☐)/i;
  const qmark=/^\s*(\d\.\d(?:\.\d)?)\*?\s+(\S.*)$/;
  const map={}; let cur=null, buf=[], inHeader=false;
  const endsQ=s=>/\?\s*$/.test(s);
  const flush=()=>{ if(cur){ let t=buf.join('\n').replace(/[ \t]+\n/g,'\n').replace(/\n{3,}/g,'\n\n').trim(); if(t) map[cur]=t; } };
  for(const raw of lines){
    const ln=raw.trim();
    const m=ln.match(qmark);
    if(m && validIds.has(m[1])){ flush(); cur=m[1]; buf=[]; inHeader=!endsQ(m[2]); continue; } // (çok satırlı) yeni soru başlığı
    if(!cur) continue;
    if(inHeader){ if(endsQ(ln)) inHeader=false; continue; }                                    // soru metni devamını atla
    if(skip.test(ln)||scoreRow.test(ln)){ continue; }
    buf.push(ln);
  }
  flush();
  return map;
}

  r.footerL=r.footerL||''; r.footerR=r.footerR||'';

  r.scores=r.scores||{}; r.qnotes=r.qnotes||{}; r.actions=r.actions||[];

function allQuestions(r){ const out=[]; r.elements.forEach(el=>el.subs.forEach(s=>s.qs.forEach(q=>out.push({el,sub:s,q})))); return out; }

/* ---------- Skor hesapları ---------- */
// P6 çoklu süreç-adımı desteği: P6 soruları her "süreç adımı" için ayrı puanlanır, EU/EP'de adımlar arası ORTALAMA alınır (resmi VDA aracı gibi).
function pstepsArr(r){ r=r||rep; return (r&&r.psteps&&r.psteps.length)?r.psteps:['1. Süreç adımı']; }
function stepKey(qid,i){ return i===0?qid:qid+'@'+i; }   // adım 0 = eski q.id (geriye dönük uyum)
function isP6Q(qid){ return /^6\.\d/.test(qid); }
// Bir sorunun etkin puanı: P6'da adımlar arası ortalama; diğerlerinde tek puan. null=cevapsız, 'nb'=uygulanamaz, sayı=puan.
function qEffScore(r,qid){
  if(isPot(r)){ const v=r.scores[qid]; return v==null?null:v; } // potansiyel: renk değeri (ortalama yok)
  if(!isP6Q(qid)){ const v=r.scores[qid]; return v==null?null:v; }
  const steps=pstepsArr(r); let sum=0,cnt=0,anyNb=false;
  for(let i=0;i<steps.length;i++){ const v=r.scores[stepKey(qid,i)]; if(v==null) continue; if(v==='nb'){anyNb=true;continue;} sum+=v;cnt++; }
  if(cnt>0) return +(sum/cnt).toFixed(4);
  return anyNb?'nb':null;
}
function subScore(r,sub){
  if(isPot(r)) return {pts:0,max:0,n:0,pct:null}; // potansiyel: sayısal puan yok (renk)
  let pts=0,max=0,n=0;
  sub.qs.forEach(q=>{ const v=qEffScore(r,q.id); if(v==null||v==='nb') return; pts+=v; max+=10; n++; });
  return {pts,max,n,pct: max? +(pts/max*100).toFixed(1):null};
}
// Öge gerçekleşme derecesi EP = ulaşılan puan / ulaşılabilecek puan (VDA: toplam/toplam, n.b. hariç)
function elScore(r,el){
  if(isPot(r)) return {pct:null, n:0, achieved:0, max:0}; // potansiyel: sayısal puan yok (renk)
  let a=0,m=0,n=0;
  el.subs.forEach(s=>s.qs.forEach(q=>{ const v=qEffScore(r,q.id); if(v==null||v==='nb')return; a+=v;m+=10;n++; }));
  return {pct: m? +(a/m*100).toFixed(1):null, n, achieved:+a.toFixed(2), max:m};
}
// VDA 6.3 aşağı çekme (downgrade) kuralları — düzenlenebilir (resmi VDA 6.3:2023, bölüm 6.3)
const VDA_DG_DEF={ aMin:90, bMin:80, epB:80, epC:70, euB:80, star4:'B', star0:'C', zeroB:true };
let _dgcfg=Object.assign({},VDA_DG_DEF,JSON.parse(localStorage.getItem('vda63_dgcfg')||'{}'));
function saveDgCfg(){ localStorage.setItem('vda63_dgcfg',JSON.stringify(_dgcfg)); }
function setDgCfg(k,v){ _dgcfg[k]=(k==='star4'||k==='star0')?v:(k==='zeroB'?!!v:Math.max(0,+v||0)); saveDgCfg(); render(); }
function resetDgCfg(){ _dgcfg=Object.assign({},VDA_DG_DEF); saveDgCfg(); render(); }
// VDA 6.3 tam hesap: EG = Σulaşılan / Σulaşılabilecek; kademe monitörü (yıldız, 0 puan, EP, EU, süreç adımı En kuralları)
function vdaCalc(r){
  const ORD={A:3,B:2,C:1}, INV={3:'A',2:'B',1:'C'};
  const worse=(a,b)=>!a?b:!b?a:INV[Math.min(ORD[a],ORD[b])];
  const dist={0:0,4:0,6:0,8:0,10:0}; let na=0, evaluated=0; const star0=[], star4=[];
  const steps=pstepsArr(r);
  const elements=r.elements.map(el=>{
    const excluded=!!(r.excluded&&r.excluded[el.id]);
    const isP6=el.id==='P6';
    const subs=el.subs.map(sub=>{
      let a=0,m=0,n=0;
      sub.qs.forEach(q=>{
        // İstatistik: hücre bazında say (P6 çok adımlı ise her süreç adımı ayrı hücre)
        if(!excluded){
          const cells = isP6 ? steps.map((st,i)=>r.scores[stepKey(q.id,i)]) : [r.scores[q.id]];
          cells.forEach(v=>{ if(v==null) return; if(v==='nb'){ na++; return; } dist[v]=(dist[v]||0)+1; evaluated++; if(q.star){ if(v===0)star0.push(q.id); else if(v===4)star4.push(q.id);} });
        }
        // Puan: etkin (P6 ortalama) değer
        const eff=qEffScore(r,q.id);
        if(eff==null||eff==='nb') return;
        a+=eff; m+=10; n++;
      });
      return {sub, achieved:+a.toFixed(2), max:m, answered:n, eu: m? +(a/m*100).toFixed(2):null};
    });
    let a=0,m=0,n=0; subs.forEach(s=>{a+=s.achieved;m+=s.max;n+=s.answered;});
    return {el, excluded, achieved:+a.toFixed(2), max:m, answered:n, ep: m? +(a/m*100).toFixed(2):null, subs, mm:parseMM(el.mm)};
  });
  let totalA=0,totalM=0; elements.forEach(E=>{ if(E.excluded||!E.max) return; totalA+=E.achieved; totalM+=E.max; });
  const EG = totalM? +(totalA/totalM*100).toFixed(2):null;
  const p6=elements.find(E=>E.el.id==='P6');
  // P6 süreç adımı uyum dereceleri En (yalnızca çok adımlı; tek adımda EP6 zaten kapsar)
  const stepRows=[];
  if(p6&&!p6.excluded&&steps.length>1){
    steps.forEach((st,i)=>{ let a=0,m=0; p6.subs.forEach(s=>s.sub.qs.forEach(q=>{ const v=r.scores[stepKey(q.id,i)]; if(v!=null&&v!=='nb'){a+=v;m+=10;} })); if(m) stepRows.push({name:st, en:Math.round(a/m*100)}); });
  }
  // Kademe monitörü — VDA 6.3:2023 §6.3 aşağı çekme kuralları (EP/EU/En % değerleri tam sayıya yuvarlanır)
  const c=_dgcfg, rules=[]; const uniq=a=>[...new Set(a)];
  let base = EG==null?null:(EG>=c.aMin?'A':EG>=c.bMin?'B':'C'); let cls=base;
  rules.push({label:`Hesaplanan EG: ≥%${c.aMin}→A · %${c.bMin}–${c.aMin}→B · <%${c.bMin}→C`, cls:base, why:EG!=null?('EG = %'+Math.round(EG)):'—'});
  const star4Cls = star4.length? c.star4 : 'A';
  rules.push({label:`En az bir *-soru 4 puan → ${c.star4}`, cls:star4Cls, why: star4.length?('Soru: '+uniq(star4).join(', ')):'yok'}); cls=worse(cls,star4Cls);
  const star0Cls = star0.length? c.star0 : 'A';
  rules.push({label:`En az bir *-soru 0 puan → ${c.star0}`, cls:star0Cls, why: star0.length?('Soru: '+uniq(star0).join(', ')):'yok'}); cls=worse(cls,star0Cls);
  const zeroCls = (c.zeroB && dist[0]>0)?'B':'A';
  rules.push({label:'En az bir soru 0 puan → B', cls:zeroCls, why: dist[0]>0?(dist[0]+' adet 0 puan'):'yok'}); cls=worse(cls,zeroCls);
  // Öge EP veya süreç adımı En: <%epB → B, <%epC → C
  let epB=[],epC=[];
  elements.forEach(E=>{ if(E.excluded||E.ep==null)return; const ep=Math.round(E.ep); if(ep<c.epC)epC.push(E.el.id+'=%'+ep); else if(ep<c.epB)epB.push(E.el.id+'=%'+ep); });
  stepRows.forEach(s=>{ if(s.en<c.epC)epC.push(s.name+'=%'+s.en); else if(s.en<c.epB)epB.push(s.name+'=%'+s.en); });
  const epCls = epC.length?'C':(epB.length?'B':'A');
  rules.push({label:`Bir öge EP veya süreç adımı En < %${c.epB} → B · < %${c.epC} → C`, cls:epCls, why:[...epC.map(x=>x+'→C'),...epB.map(x=>x+'→B')].join('; ')||('tümü ≥%'+c.epB)}); cls=worse(cls,epCls);
  // P6 alt öge EU1…EU6: <%euB → B (resmi: EU yalnızca B'ye çeker, C yok)
  let euB=[];
  if(p6&&!p6.excluded) p6.subs.forEach(s=>{ if(s.eu==null)return; const eu=Math.round(s.eu); if(eu<c.euB)euB.push(s.sub.id+'=%'+eu); });
  const euCls = euB.length?'B':'A';
  rules.push({label:`Bir P6 alt öge EU1…EU6 < %${c.euB} → B`, cls:euCls, why: euB.join('; ')||('tümü ≥%'+c.euB)}); cls=worse(cls,euCls);
  rules.push({label:'Genel gerçekleşme derecesi EG → NİHAİ KADEME', cls:cls, final:true, why:'En kötü sonuç'});
  return {elements, EG, totalA, totalM, cls, base, rules, stats:{evaluated, na, dist}, star0, star4, stepRows};
}
// Geriye dönük uyumlu sarmalayıcı (Değerlendirme sekmesi vb. kullanır)
function overall(r){
  if(isPot(r)){ const p=potCalc(r); return {pot:true, potc:p, EG:null, els:[], cls:POT_LBL[p.overall]||'—', reasons:[], zeros:[]}; }
  const c=vdaCalc(r);
  if(c.EG==null) return {EG:null, els:[], cls:null, reasons:[], zeros:[], calc:c};
  const els=c.elements.filter(E=>!E.excluded && E.ep!=null).map(E=>({el:E.el, pct:E.ep, n:E.answered}));
  const reasons=c.rules.filter(ru=>!ru.final && ru.cls && ru.cls!=='A').map(ru=>ru.label);
  const zeros=allQuestions(r).filter(x=>qEffScore(r,x.q.id)===0);
  return {EG:c.EG, els, cls:c.cls, reasons, zeros, calc:c};
}

function _mergeColl(a,b){ const out=Object.assign({},a||{}); Object.keys(b||{}).forEach(id=>{ const x=out[id],y=b[id]; if(!x || (y.updatedAt||'')>(x.updatedAt||'')) out[id]=y; }); return out; } // sadece KESİN daha yeni bulut kazanır; eşitlikte yerel (silme/aktif düzenleme) korunur
async function _syncColl(rowId, lsKey, dataKey){ // bulut ile birleştir, yerele yaz, buluta gönder

    const cloud=(data&&data[0]&&data[0].data&&data[0].data[dataKey])||{};
    const local=JSON.parse(localStorage.getItem(lsKey)||'{}');
    const merged=_mergeColl(local,cloud);
    localStorage.setItem(lsKey,JSON.stringify(merged));
    await sb.from('vda63_sync').upsert({id:rowId,data:{[dataKey]:merged,at:new Date().toISOString()}},{onConflict:'id'});
  }catch(e){ console.warn('syncColl '+rowId,e); }
}

  if(!sb) return 0;

    const {data}=await sb.from('vda63_sync').select('data').eq('id',rowId);

    if(!Object.keys(cloud).length) return 0;

// Plan türüne göre (boş/planlanan) soru listesi
function planQuestionList(p){
  const cat=CATALOG[p.reportType==='potansiyel'?'potansiyel':'surec']; const out=[];
  cat.elements.forEach(el=>{ if(p.reportType==='surec_p5p7' && (el.id==='P2'||el.id==='P3'||el.id==='P4')) return;
    el.subs.forEach(s=>s.qs.forEach(q=>out.push({id:q.id,t:q.t,star:!!q.star}))); });
  return out;
}
const PLAN_TYPELBL={surec:'VDA 6.3 Süreç Denetimi (P2–P7)',surec_p5p7:'VDA 6.3 Süreç Denetimi (P5–P7)',potansiyel:'VDA 6.3 Potansiyel Analizi'};
async function mailerPost(payload){
  if(!cfg.mailerUrl){ toast('Ayarlar → Bildirim (mailer) URL girin','err'); openSettings(); return null; }
  const r=await fetch(cfg.mailerUrl,{method:'POST',body:JSON.stringify(Object.assign({secret:cfg.driveSecret||''},payload))});
  return await r.json();
}
function planMailMeta(p){ return {title:p.title||'',org:p.org||'',customer:p.customer||'',product:(p.product||'')+(p.productCode?(' / '+p.productCode):''),location:p.location||'',plannedDate:p.plannedDate||'',auditor:p.auditor||'',typeLabel:PLAN_TYPELBL[p.reportType]||'VDA 6.3'}; }
async function planNotifyOrg(id){
  const p=getPlan(id); if(!p) return;
  const to=(p.orgEmail||'').split(',').map(x=>x.trim()).filter(Boolean);
  if(!to.length){ toast('Plana denetlenen e-posta girin','err'); return; }
  if(!confirm(to.join(', ')+' adresine planlanan (boş) soru listesi gönderilsin mi?')) return;
  toast('Gönderiliyor…');
  try{ const j=await mailerPost({action:'notifyOrg',to,plan:planMailMeta(p),questions:planQuestionList(p)});
    if(j&&j.ok){ p.firstMailSent=true; savePlanObj(p); toast('Soru listesi gönderildi','ok'); }
    else if(j) toast('Hata: '+(j.error||'gönderilemedi'),'err'); }
  catch(e){ toast('Gönderilemedi: '+e.message,'err'); }
}
async function planRemindAuditor(id){
  const p=getPlan(id); if(!p) return;
  const to=(p.auditorEmail||'').split(',').map(x=>x.trim()).filter(Boolean);
  if(!to.length){ toast('Plana denetçi e-posta girin','err'); return; }
  const daysLeft=p.plannedDate?Math.round((new Date(p.plannedDate)-new Date().setHours(0,0,0,0))/86400000):null;
  if(!confirm(to.join(', ')+' adresine denetim hatırlatması gönderilsin mi?')) return;
  toast('Gönderiliyor…');
  try{ const j=await mailerPost({action:'remindAuditor',to,plan:planMailMeta(p),daysLeft});
    if(j&&j.ok) toast('Hatırlatma gönderildi','ok'); else if(j) toast('Hata: '+(j.error||'gönderilemedi'),'err'); }
  catch(e){ toast('Gönderilemedi: '+e.message,'err'); }
}

    .map(p=>{ const diff=Math.round((new Date(p.plannedDate)-today)/86400000); return {p,diff}; }).sort((a,b)=>a.diff-b.diff);

    </div>

function startPlan(id){
  const p=getPlan(id); if(!p) return;
  if(p.reportId && localStorage.getItem('vda63_r_'+p.reportId)){ loadReport(p.reportId); return; } // zaten başlatıldı → aç
  const rt=(p.reportType==='potansiyel')?'potansiyel':'surec';
  const r=newReportObj(rt, p.title||'');
  if(p.reportType==='surec_p5p7'){ r.excluded={P2:true,P3:true,P4:true}; } // sadece P5-P7 değerlendirilir
  r.meta.org.name=p.org||'';
  if(p.customer) r.meta.customer=p.customer;
  if(p.product||p.productCode) r.meta.scope=(p.product||'')+(p.productCode?' / Kod: '+p.productCode:'');
  if(p.location) r.meta.org.city=p.location;
  if(p.plannedDate){ r.meta.auditStart=p.plannedDate; }
  if(p.auditor) r.team=[{type:'Baş Denetçi',name:p.auditor,company:'',dept:'',certNo:'',email:'',signed:false}];
  if(p.category==='self') r.meta.internalAudit=true;
  if(p.notes) r.meta.reason=p.notes;
  r.planId=p.id;
  rep=r; activeTab='header'; saveLocal();
  p.reportId=r.id; if(p.status==='Planlandı') p.status='Devam'; savePlanObj(p);
  render(); toast('Denetim başlatıldı','ok');
}

const LS_SUP='vda63_suppliers';
// Eşik kuralları: her kriter için {bands:[{upto, val}], over} — değer ≤ upto ise val; hiçbiri değilse over.
const RISK_DEFAULTS={wCiro:3,wImp:3,wSafety:3,wComp:2,wProc:2,wProcN:2,wYear:2,wRecur:2,wPpm:2,wCreturn:2,equal:false,threshold:6,
  compRule:{bands:[{upto:2,val:2},{upto:5,val:4},{upto:10,val:6},{upto:20,val:8}],over:10},
  procRule:{bands:[{upto:2,val:2},{upto:5,val:4},{upto:10,val:6},{upto:20,val:8}],over:10},
  yearRule:{bands:[{upto:1,val:2},{upto:2,val:5},{upto:3,val:8}],over:10},
  recurRule:{bands:[{upto:0,val:1},{upto:2,val:4},{upto:5,val:7}],over:10},
  ppmRule:{bands:[{upto:50,val:1},{upto:200,val:4},{upto:500,val:7}],over:10},
  creturnRule:{bands:[{upto:0,val:1},{upto:3,val:4},{upto:8,val:7}],over:10}};
let _riskcfg=JSON.parse(localStorage.getItem('vda63_riskcfg')||'null')||{};
(function(){ for(const k in RISK_DEFAULTS){ if(_riskcfg[k]===undefined) _riskcfg[k]=JSON.parse(JSON.stringify(RISK_DEFAULTS[k])); } })();
function saveRiskCfg(){ localStorage.setItem('vda63_riskcfg',JSON.stringify(_riskcfg)); }
function lookupRule(rule,x){ x=+x||0; for(const b of rule.bands){ if(x<=b.upto) return b.val; } return rule.over; }
function rawSup(){ return JSON.parse(localStorage.getItem(LS_SUP)||'{}'); }
function supMap(){ const r=rawSup(),o={}; for(const id in r){ if(!r[id].deleted) o[id]=r[id]; } return o; }

function updSup(id,k,v){ const l=rawSup(); if(l[id]&&!l[id].deleted){ l[id][k]=v; l[id].updatedAt=new Date().toISOString(); localStorage.setItem(LS_SUP,JSON.stringify(l)); render(); scheduleSupSync(); } }
function delSupplier(id){ if(!confirm('Tedarikçi silinsin mi?'))return; const l=rawSup(); l[id]={id,deleted:true,updatedAt:new Date().toISOString()}; localStorage.setItem(LS_SUP,JSON.stringify(l)); render(); scheduleSupSync(); }
function compScore(count){ return lookupRule(_riskcfg.compRule,count); }
function supplierRisk(s){
  if(s.catalog) return {catalog:true,risk:0,reco:s.recoOverride==='on'};
  const c=_riskcfg, w=k=>c.equal?1:(+c[k]||0);
  const cs=lookupRule(c.compRule,s.comp);
  const ps=lookupRule(c.procRule,s.procN);
  const ys=s.isNew?c.yearRule.over:lookupRule(c.yearRule,s.lastAuditYears);
  const rs=lookupRule(c.recurRule,s.recurrence);
  const pp=lookupRule(c.ppmRule,s.ppm);
  const crs=lookupRule(c.creturnRule,s.creturn);
  const wc=w('wCiro'),wi=w('wImp'),wsf=w('wSafety'),wp=w('wComp'),wpr=w('wProc'),wpn=w('wProcN'),wy=w('wYear'),wre=w('wRecur'),wpm=w('wPpm'),wcr=w('wCreturn');
  const den=wc+wi+wsf+wp+wpr+wpn+wy+wre+wpm+wcr||1;
  const risk=+(((+s.ciro||0)*wc+(+s.imp||0)*wi+(+s.safety||0)*wsf+cs*wp+(+s.proc||0)*wpr+ps*wpn+ys*wy+rs*wre+pp*wpm+crs*wcr)/den).toFixed(2);
  // Öneri: kullanıcı override > yeni tedarikçi (otomatik öner) > risk eşiği
  let reco; if(s.recoOverride==='on')reco=true; else if(s.recoOverride==='off')reco=false; else reco=!!s.isNew||risk>=c.threshold;
  return {catalog:false,base:risk,mult:1,compScore:cs,procScore:ps,yearScore:ys,recurScore:rs,ppmScore:pp,creturnScore:crs,risk,reco};
}
function ruleEditor(key,label,valLabel){

    <table class="rule-tbl"><tbody>
    ${r.bands.map((b,i)=>`<tr><td>≤ <input type="number" value="${b.upto}" onchange="updRuleBand('${key}',${i},'upto',this.value)"></td><td>→ <input type="number" step="0.05" value="${b.val}" onchange="updRuleBand('${key}',${i},'val',this.value)"></td><td class="no-print"><button class="delx" onclick="delRuleBand('${key}',${i})">🗑</button></td></tr>`).join('')}
    <tr><td><b>üstü →</b></td><td>→ <input type="number" step="0.05" value="${r.over}" onchange="updRuleOver('${key}',this.value)"></td><td></td></tr>
    </tbody></table>
    <div class="muted" style="font-size:.7rem;margin:.2rem 0">değer = ${valLabel}</div>
    <button class="addbtn no-print" onclick="addRuleBand('${key}')">+ eşik</button></div>`;
}
function updRuleBand(key,i,f,v){ _riskcfg[key].bands[i][f]=+v||0; if(f==='upto') _riskcfg[key].bands.sort((a,b)=>a.upto-b.upto); saveRiskCfg(); render(); }
function updRuleOver(key,v){ _riskcfg[key].over=+v||0; saveRiskCfg(); render(); }
function addRuleBand(key){ _riskcfg[key].bands.push({upto:0,val:1}); saveRiskCfg(); render(); }
function delRuleBand(key,i){ _riskcfg[key].bands.splice(i,1); saveRiskCfg(); render(); }
function resetRiskRules(){ if(!confirm('Puanlama eşikleri varsayılana dönsün mü?'))return; ['compRule','recurRule','ppmRule','creturnRule'].forEach(k=>_riskcfg[k]=JSON.parse(JSON.stringify(RISK_DEFAULTS[k]))); saveRiskCfg(); render(); }
// İsim normalize (büyük/küçük harf + boşluk toleransı)
function _norm(x){ return (x||'').trim().toLocaleLowerCase('tr'); }
function _planMatchesSup(p,s){ return (s.planId&&p.id===s.planId)||(p.supplierId&&p.supplierId===s.id)||(p.org&&s.name&&_norm(p.org)===_norm(s.name)); }
// Tedarikçinin daha önce yapılmış planı (link ya da isim eşleşmesi)
function supplierPlan(s){
  if(!s) return null; const pm=plansMap();
  if(s.planId && pm[s.planId]) return pm[s.planId];
  return Object.values(pm).find(p=>p.category==='tedarikci' && _planMatchesSup(p,s)) || null;
}
// Bu tedarikçiye ait planlar içinden EN GÜNCEL "Son Denetim Tarihi"ni (+puanı) bul → riske aktarmak için
function supplierLastAudit(s){
  if(!s) return null; const pm=plansMap();
  let best=null, bestDate='';
  // 1) Açıkça bağlanmış plan (risk satırında elle seçilen) varsa doğrudan onu kullan
  if(s.planId && pm[s.planId]){ const p=pm[s.planId]; const eff=p.lastAuditDate||p.plannedDate||''; if(eff){ best=p; bestDate=eff; } }
  // 2) Değilse eşleşen planlar içinden en güncel tarihliyi al
  if(!best) Object.values(pm).forEach(p=>{
    // Tedarikçiye bağlı HER plan (tür fark etmez): planId / supplierId / isim eşleşmesi
    if(!_planMatchesSup(p,s)) return;
    // Etkin denetim tarihi: açıkça girilen Son Denetim Tarihi; yoksa planlanan tarih (tamamlanmış ya da planlı fark etmez).
    const eff=p.lastAuditDate || p.plannedDate || '';
    if(eff && (!best || eff>bestDate)){ best=p; bestDate=eff; }
  });
  if(!best) return null;
  const d=new Date(bestDate); if(isNaN(d.getTime())) return null;
  // Geçmiş tarih → kaç yıl önce; gelecek planlı tarih → 0 yıl (en güncel/denetlenmiş kabul).
  const years=Math.max(0,+(((Date.now()-d.getTime())/(365.25*86400000)).toFixed(1)));
  const future=bestDate>new Date().toISOString().slice(0,10);
  return {planId:best.id, date:bestDate, score:best.lastScore||'', years, planTitle:best.title||'', future};
}
function _dmy(iso){ if(!iso)return''; const p=String(iso).slice(0,10).split('-'); return p.length===3?(p[2]+'.'+p[1]+'.'+p[0].slice(2)):iso; }
// Risk satırından tedarikçiyi bir plana elle bağla (planId)
function linkSupPlan(id,planId){ const s=supMap()[id]; if(!s)return; if(planId)s.planId=planId; else delete s.planId; saveSup(s); render(); }
function applyLastAuditFromPlan(id){
  const s=supMap()[id]; if(!s) return; const pa=supplierLastAudit(s);
  if(!pa){ toast('Bağlı planda tarih yok','err'); return; }
  s.lastAuditYears=pa.years; s.isNew=false; if(pa.planId)s.planId=pa.planId; saveSup(s);
  toast('Plandan aktarıldı: '+_dmy(pa.date)+(pa.future?' (planlı)':'')+' → '+pa.years+' yıl'+(pa.score?(' · '+pa.score):''),'ok'); render();
}
function applyAllLastAuditFromPlans(){
  const l=supMap(); let n=0, skip=0;
  Object.values(l).forEach(s=>{ if(s.catalog) return; const pa=supplierLastAudit(s); if(pa){ s.lastAuditYears=pa.years; s.isNew=false; if(pa.planId)s.planId=pa.planId; n++; } else skip++; });
  localStorage.setItem(LS_SUP,JSON.stringify(l));
  toast(n?(n+' tedarikçi plandan güncellendi'+(skip?(' · '+skip+' atlandı (bağlı plan yok)'):'')):'Hiçbir tedarikçinin bağlı planı yok. Önce satırdaki "Plan:" menüsünden bir plan seçin ya da planın "Denetlenen Org."unu tedarikçi adıyla aynı yapın.',n?'ok':'err'); render();
}
// Planlardan tek tıkla aktar: (1) "Denetlenen Org."u risk matrisinde OLMAYANLARI yeni satır olarak ekle, (2) var olanların "Son Denetim (yıl)"ini bağlı plandan güncelle
function syncSuppliersFromPlans(){
  const l=supMap();
  const exist=new Set(Object.values(l).map(s=>_norm(s.name)));
  const pm=plansMap(); let added=0, noorg=0;
  // 1) Eksik tedarikçileri ekle (en güncel tarihli plan önce → yeni satır o plana bağlanır)
  Object.values(pm).sort((a,b)=>String(b.plannedDate||b.lastAuditDate||'').localeCompare(String(a.plannedDate||a.lastAuditDate||''))).forEach(p=>{
    const org=(p.org||'').trim();
    if(!org){ noorg++; return; }                 // org'u boş plan → tedarikçi adı yok, atla
    if(exist.has(_norm(org))) return;             // zaten risk matrisinde var
    const id=uid('sup');
    l[id]={id,name:org,ciro:5,imp:5,safety:5,comp:5,proc:5,procN:5,lastAuditYears:0,isNew:false,catalog:false,recurrence:0,ppm:0,creturn:0,recoOverride:'auto',planId:p.id};
    exist.add(_norm(org)); added++;
  });
  // 2) Tüm tedarikçilerin (yeni eklenenler dahil) yılını bağlı plandan güncelle
  let upd=0;
  Object.values(l).forEach(s=>{ if(s.catalog) return; const pa=supplierLastAudit(s); if(pa){ s.lastAuditYears=pa.years; s.isNew=false; if(pa.planId)s.planId=pa.planId; upd++; } });
  localStorage.setItem(LS_SUP,JSON.stringify(l));
  toast((added?(added+' yeni tedarikçi eklendi · '):'')+(upd?(upd+' tedarikçinin son denetimi güncellendi'):(added?'':'Bağlı plan bulunamadı'))+(noorg?(' · '+noorg+' planın org alanı boş'):''), (added||upd)?'ok':'err'); render();
}
function planFromSupplier(id){
  const s=supMap()[id]; if(!s)return; const r=supplierRisk(s);
  const ex=supplierPlan(s);
  if(ex){ if(!s.planId){ s.planId=ex.id; saveSup(s); } startPlan(ex.id); return; } // zaten plan var → aç
  const pid=uid('pl');
  savePlanObj({id:pid,category:'tedarikci',reportType:'surec',title:(s.name||'Tedarikçi')+' — Tedarikçi Denetimi',org:s.name||'',supplierId:s.id,status:'Planlandı',notes:'Risk skoru: '+r.risk+' (otomatik önceliklendirme)'});
  s.planId=pid; saveSup(s);
  toast('Denetim planı oluşturuldu','ok'); goPlans();
}

function delProcess(j){ rep.processes.splice(j,1);

function splitDesc(text){
  text=(text||'').trim();
  if(!text) return {req:'',ex:'',single:false};
  const exIdx=text.indexOf(EX_HEAD);
  if(exIdx<0){
    const hasReq=text.startsWith(REQ_HEAD);
    return {req:(hasReq?text.slice(REQ_HEAD.length):text).trim(), ex:'', single:!hasReq};
  }
  let reqPart=text.slice(0,exIdx);
  if(reqPart.startsWith(REQ_HEAD)) reqPart=reqPart.slice(REQ_HEAD.length);
  return {req:reqPart.trim(), ex:text.slice(exIdx+EX_HEAD.length).trim(), single:false};
}

// Potansiyel Analizi sonuç tablosu (trafik ışığı)
function potSummaryHtml(){
  const p=potCalc(rep);
  const cell=(n,bg,fg)=>`<td style="text-align:center;font-weight:800;background:${bg};color:${fg||'#fff'}">${n}</td>`;
  const incomplete=p.unanswered>0;
  const genTxt=incomplete?('Uygulanamaz — analiz eksik ('+p.unanswered+' soru değerlendirilmedi)'):(POT_LBL[p.overall]+' — '+POT_STATUS[p.overall]);
  const gen=`<td style="text-align:center;font-weight:800;background:${POT_BG[p.overall]};color:#fff">${genTxt}</td>`;
  let html=`<div class="sec-title">Denetim Sonucu <span class="muted" style="font-size:.8rem">· Potansiyel Analizi (trafik ışığı)</span></div>
  <table class="matrix"><thead><tr><th>Proje, Ürün, Süreç</th><th class="r">Yeşil</th><th class="r">Sarı</th><th class="r">Kırmızı</th><th class="r">Uygulanamaz</th><th>Genel değerlendirme</th></tr></thead>
  <tbody><tr><td><b>Tüm sorular</b> <span class="muted">(${p.answered} değerlendirildi · ${p.unanswered} boş)</span></td>${cell(p.yesil,'var(--A)')}${cell(p.sari,'var(--yellow)','#222')}${cell(p.kirmizi,'var(--C)')}${cell(p.nb,'var(--muted)')}${gen}</tr></tbody></table>
  <details class="no-print" style="margin:.3rem 0 .6rem"><summary style="cursor:pointer;font-weight:700;color:var(--primary2)">⚙ Sınıflandırma eşikleri (düzenlenebilir) <button class="icon-btn" style="margin-left:.5rem" onclick="event.preventDefault();resetPotCfg()">↺ Varsayılan</button></summary>
    <table class="matrix" style="max-width:560px;margin-top:.4rem"><thead><tr><th>Sınıflandırma</th><th>Sarı (adet)</th><th>Kırmızı (adet)</th></tr></thead><tbody>
      <tr><td><span class="mx-cls" style="background:var(--C)">Kırmızı</span> Yasaklı tedarikçi</td><td><b>&gt; <input type="number" min="0" value="${_potcfg.yellowMax}" onchange="setPotCfg('yellowMax',this.value)" style="width:60px"></b>'den fazla</td><td><b>1 ve üzeri</b></td></tr>
      <tr><td><span class="mx-cls" style="background:var(--yellow);color:#222">Sarı</span> Şartlı onaylı tedarikçi</td><td>en fazla ${_potcfg.yellowMax}</td><td>yok</td></tr>
      <tr><td><span class="mx-cls" style="background:var(--A)">Yeşil</span> Onaylı tedarikçi</td><td>en fazla <input type="number" min="0" value="${_potcfg.greenMax}" onchange="setPotCfg('greenMax',this.value)" style="width:60px"></td><td>yok</td></tr>
    </tbody></table>
    <p class="hint">1+ <b>Kırmızı</b> ya da ${_potcfg.yellowMax}'den fazla <b>Sarı</b> → Yasaklı. Kırmızı yok &amp; Sarı ${_potcfg.greenMax+1}–${_potcfg.yellowMax} → Şartlı onaylı. Kırmızı yok &amp; Sarı ≤ ${_potcfg.greenMax} → Onaylı.</p>
  </details>
  <table class="matrix" style="max-width:760px"><thead><tr><th>Değerlendirme</th><th>Durum</th><th>Açıklama</th></tr></thead><tbody>
    <tr><td><span class="mx-cls" style="background:var(--A)">Yeşil</span></td><td>Onaylı tedarikçi</td><td>Verilen ürün/süreç için nominasyon yapılabilir.</td></tr>
    <tr><td><span class="mx-cls" style="background:var(--yellow);color:#222">Sarı</span></td><td>Şartlı onaylı tedarikçi</td><td>Verilen ürün/süreç için nominasyon şartlı olarak mümkündür.</td></tr>
    <tr><td><span class="mx-cls" style="background:var(--C)">Kırmızı</span></td><td>Yasaklı tedarikçi</td><td>Yasaklı tedarikçi.</td></tr>
  </tbody></table>`;
  html+=`<details style="margin-top:1.2rem"><summary style="cursor:pointer;font-weight:700;color:var(--primary2)">▸ Süreç ögeleri kırılımı (öge bazında renk sayıları)</summary>
  <table class="matrix" style="margin-top:.4rem"><thead><tr><th>Öge</th><th class="r">Yeşil</th><th class="r">Sarı</th><th class="r">Kırmızı</th><th class="r">n.b.</th><th>Sonuç</th></tr></thead><tbody>`;
  rep.elements.forEach(el=>{
    if(rep.excluded[el.id]){ html+=`<tr class="mx-excl"><td><b>${el.id}</b> ${esc(el.name)}</td><td colspan="4" style="text-align:center" class="muted">Değerlendirme dışı</td><td><span class="muted">Uygulanamaz</span></td></tr>`; return; }
    let y=0,s=0,k=0,n=0; elQ(el).forEach(q=>{const v=rep.scores[q.id]; if(v==='yesil')y++;else if(v==='sari')s++;else if(v==='kirmizi')k++;else if(v==='nb')n++;});
    const c=k>0?'kirmizi':(s>0?'sari':(y>0?'yesil':'nb'));
    html+=`<tr><td><b>${el.id}</b> ${esc(el.name)}</td><td class="r">${y}</td><td class="r">${s}</td><td class="r">${k}</td><td class="r">${n}</td><td><span class="mx-cls" style="background:${POT_BG[c]}">${POT_LBL[c]}</span></td></tr>`;
  });
  html+=`</tbody></table></details>`;
  return html;

function viewMatrix(){
  if(isPot(rep)){ const p=potCalc(rep); if(!p.answered && !p.nb) return `<div class="sec-title">Denetim Sonucu</div><div class="empty">Henüz değerlendirilen soru yok. <b>Sorular</b> sekmesinden Kırmızı/Sarı/Yeşil seçin.</div>`; return potSummaryHtml(); }
  const c=vdaCalc(rep);
  if(c.EG==null) return `<div class="sec-title">Değerlendirme Matrisi</div><div class="empty">Henüz puanlanan soru yok. <b>Sorular</b> sekmesinden değerlendirme yapın.</div>`;
  const epCells=c.elements.map(E=>`<th>E<sub>${E.el.id}</sub></th>`).join('');

  // P6 EU alt öge kırılımı — süreç adımları (resmi VDA aracı gibi: adım satırları + soru sütunları + ortalama)
  let p6html='';
  const p6=c.elements.find(E=>E.el.id==='P6');
  if(p6 && !p6.excluded){
    const steps=pstepsArr(rep);
    p6html=`<div class="sec-title" style="font-size:.95rem;margin-top:1.6rem">P6 — Üretim Süreç Analizi · Alt Öge Gerçekleşme Dereceleri (E<sub>U</sub>)${steps.length>1?` <span class="muted" style="font-size:.78rem">(${steps.length} süreç adımı, adımlar arası ortalama)</span>`:''}</div>`;
    p6.subs.forEach(s=>{
      const qs=s.sub.qs;
      const head=`<th>Süreç adımı</th>${qs.map(q=>`<th class="r">${q.id}${q.star?' *':''}</th>`).join('')}<th class="r">Ulaşılan</th><th class="r">Maks</th>`;
      const rows=steps.map((st,i)=>{
        let ra=0,rm=0; const cells=qs.map(q=>{ const v=rep.scores[stepKey(q.id,i)]; if(v!=null&&v!=='nb'){ra+=v;rm+=10;} return `<td class="r">${v==null?'–':v==='nb'?'n.b.':v}</td>`; }).join('');
        return `<tr><td>${esc(st)}</td>${cells}<td class="r">${ra}</td><td class="r">${rm}</td></tr>`;
      }).join('');
      const avgCells=qs.map(q=>{ const e=qEffScore(rep,q.id); return `<td class="r"><b>${e==null?'–':e==='nb'?'n.b.':(+(+e).toFixed(2))}</b></td>`; }).join('');
      const avgRow=`<tr class="p6avg-row"><td><b>Ortalama → E<sub>U</sub></b></td>${avgCells}<td class="r"><b>${s.achieved}</b></td><td class="r"><b>${s.max}</b></td></tr>`;
      p6html+=`<div class="sub-head" style="margin-top:1rem">${s.sub.id} · ${esc(s.sub.name)} — E<sub>U</sub> <b>${s.eu!=null?'%'+Math.round(s.eu):'—'}</b> ${s.eu!=null&&s.eu<80?clsBadge(s.eu<70?'C':'B'):''}</div>
      <div style="overflow:auto"><table class="matrix p6grid"><thead><tr>${head}</tr></thead><tbody>${rows}${avgRow}</tbody></table></div>`;
    });
  }
  return `<div class="sec-title">Değerlendirme Matrisi · <span class="muted" style="font-size:.8rem">VDA 6.3 hesap yöntemi</span></div>

  <div class="mx-grid">
    <div class="card">
      <div class="mx-h">Kademe Monitörü <span class="muted" style="font-size:.72rem;font-weight:400">· aşağı çekme (downgrade) kuralları</span></div>
      <table class="matrix mx-mon"><thead><tr><th style="width:48px">Kademe</th><th>Kural</th><th>Tetikleyen</th></tr></thead><tbody>
        ${c.rules.map(ru=>`<tr class="${ru.final?'dg-final':(ru.cls&&ru.cls!=='A'?'dg-hit':'')}"><td>${clsBadge(ru.cls)}</td><td>${esc(ru.label)}</td><td style="font-size:.72rem;color:${ru.cls&&ru.cls!=='A'&&!ru.final?'var(--C)':'var(--muted)'}">${esc(ru.why||'')}</td></tr>`).join('')}
      </tbody></table>
      ${dgEditorHtml()}
    </div>
    <div class="card">
      <div class="mx-h">Genel Gerçekleşme Derecesi E<sub>G</sub> (PGN) [%]</div>
      <table class="matrix"><tbody>
        <tr><td>İlgili sorularla ulaşılan toplam puan</td><td class="r"><b>${c.totalA}</b></td></tr>
        <tr><td>İlgili sorularla ulaşılabilecek toplam puan</td><td class="r"><b>${c.totalM}</b></td></tr>
      </tbody></table>
      <table class="matrix" style="margin-top:.7rem"><thead><tr><th>E<sub>G</sub></th><th>Kademelendirme</th></tr></thead>
        <tbody><tr><td style="font-size:1.3rem;font-weight:800">%${Math.round(c.EG)}</td><td style="text-align:center;font-size:1.3rem;font-weight:800;color:#fff;background:${CLSBG[c.cls]}">${c.cls}</td></tr></tbody></table>
      <table class="matrix" style="margin-top:.7rem"><thead><tr>${epCells}</tr></thead><tbody><tr>${epVals}</tr></tbody></table>
      <p class="hint">E<sub>G</sub> = Σ ulaşılan puan ÷ Σ ulaşılabilecek puan (n.b. hariç). Kademe, monitördeki en düşük sonuçtur.</p>
    </div>
  </div>

  <div class="sec-title" style="font-size:.95rem;margin-top:1.6rem">İstatistik</div>
  <table class="matrix"><thead><tr><th>Değerlendirildi</th><th>Uygulanamaz (n.b.)</th><th class="r">0</th><th class="r">4</th><th class="r">6</th><th class="r">8</th><th class="r">10</th></tr></thead>
    <tbody><tr><td class="r">${c.stats.evaluated}</td><td class="r">${c.stats.na}</td><td class="r">${c.stats.dist[0]}</td><td class="r">${c.stats.dist[4]}</td><td class="r">${c.stats.dist[6]}</td><td class="r">${c.stats.dist[8]}</td><td class="r">${c.stats.dist[10]}</td></tr></tbody></table>

  <div class="sec-title" style="font-size:.95rem;margin-top:1.6rem">Süreç Ögeleri (E<sub>P</sub>)</div>
  <table class="matrix"><thead><tr><th>Öge</th><th class="r">Cevaplanan</th><th class="r">Asgari</th><th class="r">Ulaşılan</th><th class="r">Maksimum</th><th class="r">E<sub>P</sub> [%]</th></tr></thead><tbody>
    ${c.elements.map(E=>`<tr class="${E.excluded?'mx-excl':''}"><td><b>${E.el.id}</b> ${esc(E.el.name)}</td>${E.excluded
        ?`<td colspan="4" style="text-align:center" class="muted">Değerlendirme dışı</td><td class="r"><span class="muted">Uygulanamaz</span></td>`
        :`<td class="r">${E.answered}</td><td class="r">${E.mm.min||'-'}</td><td class="r">${E.achieved}</td><td class="r">${E.max}</td><td class="r"><b>${E.ep!=null?'%'+Math.round(E.ep):'—'}</b> ${E.ep!=null&&E.ep<80?clsBadge(E.ep<70?'C':'B'):''}</td>`}</tr>`).join('')}
  </tbody></table>
  ${p6html}`;
}

function _scoreInfo(q,elId){
  // {txt, bg, isNb, isGreen, show} — etkin skora göre
  const pot=isPot(rep), steps=pstepsArr(rep);
  if(pot){ const v=rep.scores[q.id]; if(v==null) return null; if(v==='nb') return {txt:'Uygulanamaz',bg:POT_BG.nb,isNb:true,isGreen:false}; return {txt:POT_LBL[v],bg:POT_BG[v],isNb:false,isGreen:v==='yesil'}; }
  if(elId==='P6' && steps.length>1){ const eff=qEffScore(rep,q.id); if(eff==null) return null; if(eff==='nb') return {txt:'n.b.',bg:'',isNb:true,isGreen:false}; return {txt:(+eff).toFixed(2),bg:'',isNb:false,isGreen:eff===10}; }
  const v=rep.scores[q.id]; if(v==null) return null; if(v==='nb') return {txt:'n.b.',bg:'',isNb:true,isGreen:false}; return {txt:String(v),bg:'',isNb:false,isGreen:v===10};
}
function questionsPrintHtml(c){

        if(el.id==='P6' && steps.length>1 && !isPot(rep)) subq+=`<div class="pr-steps">${steps.map((st,i)=>{const sv=rep.scores[stepKey(q.id,i)];return `${esc(st)}: <b>${sv==null?'–':sv==='nb'?'n.b.':sv}</b>`;}).join(' · ')}</div>`;
        if(c.showDesc && q.r) subq+=`<div class="pr-desc">${descColsHtml(q.r)}</div>`;

        if(c.showComments){ const cm=rep.comments[q.id]||[]; if(cm.length) subq+=`<div class="pr-cmt"><b>Dahili yorumlar:</b><ul>${cm.map(x=>`<li>[${x.s==='uyumsuz'?'uyumsuz':'uygun'}] ${esc(x.t)}</li>`).join('')}</ul></div>`; }
        if(c.showImages){ const im=rep.images[q.id]||[]; if(im.length) subq+=`<div class="pr-imgs" style="grid-template-columns:repeat(${c.imgCols},1fr)">${im.map(x=>isImgName(x.name)?`<img src="${esc(x.thumb)}">`:`<span class="pr-file">${fileIcon(x.name)} ${esc(x.name)}</span>`).join('')}</div>`; }

function scoreColor(v){ return v===0?'var(--C)':v===4?'#e06b1f':v===6?'var(--yellow)':v===8?'#9ccc65':'var(--A)'; }
function actionQuestions(r){
  const out=[];
  if(isPot(r)){
    r.elements.forEach(el=>{ if(r.excluded[el.id]) return;
      el.subs.forEach(sub=>sub.qs.forEach(q=>{ const v=r.scores[q.id]; if(v==='kirmizi'||v==='sari') out.push({q,el,sub,score:v,ref:'',key:q.id,pot:true}); }));
    });
    return out.sort((a,b)=>(a.score==='kirmizi'?0:1)-(b.score==='kirmizi'?0:1)); // kırmızı önce
  }
  const steps=pstepsArr(r); const multi=steps.length>1;
  r.elements.forEach((el,ei)=>{ if(r.excluded[el.id]) return;
    el.subs.forEach((sub,si)=>sub.qs.forEach((q,qi)=>{
      if(el.id==='P6'){
        // P6: her süreç adımı ayrı değerlendirilir → ≤8 olan HER adım ayrı aksiyon satırı (resmi VDA aracı gibi)
        steps.forEach((st,i)=>{ const v=r.scores[stepKey(q.id,i)]; if(typeof v==='number' && v<=8) out.push({q,el,sub,score:v,ref:multi?('Süreç (adımı) '+st):'',key:q.id+(i?'@s'+i:'')}); });
      } else {
        const v=r.scores[q.id]; if(typeof v==='number' && v<=8) out.push({q,el,sub,score:v,ref:'',key:q.id});
      }
    }));
  });
  return out.sort((a,b)=>a.score-b.score);
}

  area.innerHTML=buildPrintDoc({pHeader:true,pEval:false,pQuestions:false,pFindings:true,showNb:true,showGreen:true,showDesc:false,showComments:false,showImages:false,imgCols:3});
  document.body.classList.add('doc-print');
  const cleanup=()=>{ document.body.classList.remove('doc-print'); area.innerHTML=''; window.removeEventListener('afterprint',cleanup); };
  window.addEventListener('afterprint',cleanup);
  setTimeout(()=>{ window.print(); setTimeout(cleanup,1500); },120);
}

    return '<tr>'+['<b>'+esc(x.q.id)+(x.q.star?'*':'')+'</b>'+(x.ref?'<br><small>'+esc(x.ref)+'</small>':''),esc(f),sc,esc(a.acil||''),esc(a.nedenler||''),esc(a.onlemler||''),esc(a.bitis||''),esc(a.sorumlu||''),esc(a.etkinlik||'')].map(c=>'<td style="border:1px solid #ccc;padding:4px 6px;vertical-align:top">'+c+'</td>').join('')+'</tr>'; }).join('');
  return '<div style="font-family:Arial,sans-serif"><h2 style="color:#0a6e4f">VDA 6.3 Aksiyon Planı</h2>'+

    '</tr></thead><tbody>'+rows+'</tbody></table>'+

async function emailActionPlan(){
  if(!cfg.mailerUrl){ toast('Önce Ayarlar → Bildirim (Mailer) URL girin','err'); openSettings(); return; }
  if(!actionQuestions(rep).length){ toast('Aksiyon gerektiren bulgu yok','err'); return; }
  let to=prompt('Denetlenen e-posta(lar) — virgülle ayırın:', (rep.meta.org&&rep.meta.org.email)||'');
  if(to==null) return; to=to.trim(); if(!to){ toast('E-posta girilmedi','err'); return; }
  if(rep.meta.org && !rep.meta.org.email){ rep.meta.org.email=to.split(',')[0].trim(); scheduleSave(); }
  toast('Aksiyon planı gönderiliyor…');
  try{
    const wb=await buildActionWorkbook(); const buf=await wb.xlsx.writeBuffer();
    const j=await mailerPost({ action:'actionPlan', to, subject:'VDA 6.3 Aksiyon Planı — '+(rep.meta.name||''), html:actionPlanEmailHtml(),
      attach:{ name:'AksiyonPlani_'+((rep.meta.name||'rapor').replace(/[^\w\-]+/g,'_'))+'.xlsx', mime:'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet', b64:_ab2b64(buf) } });
    if(j&&j.ok) toast('Aksiyon planı gönderildi: '+to,'ok'); else toast('Gönderilemedi: '+((j&&j.error)||'mailer yanıtı yok')+' (mailer güncel sürüm mü?)','err');
  }catch(e){ console.warn(e); toast('Hata: '+e.message,'err'); }
}

function saveSettings(){
  cfg.supaUrl=document.getElementById('s_url').value.trim();
  cfg.supaKey=document.getElementById('s_key').value.trim();
  cfg.driveUrl=document.getElementById('s_drive').value.trim();
  cfg.driveSecret=document.getElementById('s_drivesec').value.trim();
  cfg.mailerUrl=(document.getElementById('s_mailer')||{}).value.trim();

  initSupabase(); syncBadge('ok'); closeModal(); render(); toast('Ayarlar kaydedildi','ok');
  if(sb&&rep) cloudPush();
  if(sb){ pullShared().then(()=>{ syncDescOverrides(); syncPlans(); _syncColl('suppliers',LS_SUP,'suppliers'); toast('Bulutla senkronlandı','ok'); }); } // paylaşılanları çek + yereldekini yükle (çift yön)
}
async function testDrive(){
  const url=(document.getElementById('s_drive')||{}).value||cfg.driveUrl||'';
  const sec=(document.getElementById('s_drivesec')||{}).value||cfg.driveSecret||'';
  if(!url){ toast('Önce Drive URL girin','err'); return; }
  toast('Drive test ediliyor…');
  try{
    const r=await fetch(url+(url.indexOf('?')>=0?'&':'?')+'action=test&secret='+encodeURIComponent(sec));
    const j=await r.json();
    if(j.ok) toast('✓ Drive bağlı — klasör: '+(j.folder||'VDA6.3'),'ok');
    else toast('Drive yanıtı: '+(j.error||'hata'),'err');
  }catch(e){ console.warn(e); toast('Bağlantı/CORS hatası: '+e.message,'err'); }
}

/* ---------- Yedek / Geri yükle ---------- */
function backupJSON(){
  // rapor + global açıklamalar birlikte yedeklenir (taşınabilir / kalıcı)
  const data={ _vda63:1, report:rep||null, descriptions:descOverrides };
  const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
  const a=document.createElement('a'); a.href=URL.createObjectURL(blob);
  a.download='VDA63_'+((rep&&rep.meta.name)||'yedek').replace(/[^\w\-]+/g,'_')+'.json'; a.click();
}
function restoreJSON(file){
  if(!file) return; const fr=new FileReader();
  fr.onload=()=>{ try{
    const o=JSON.parse(fr.result);
    if(o && o._vda63){ // yeni zarf formatı: açıklamalar + rapor
      if(o.descriptions && Object.keys(o.descriptions).length){ descOverrides=Object.assign({},o.descriptions); compactStorage(); saveDescOverrides(); }
      if(o.report && o.report.elements){ const r=o.report; if(!r.id) r.id=uid(); rep=migrate(r); activeTab='header'; saveLocal(); }
      render(); toast('Yedek yüklendi (açıklamalar dahil)','ok');
    } else if(o && o.elements && o.type){ // eski format: tek rapor
      if(!o.id) o.id=uid(); rep=migrate(o); activeTab='header'; saveLocal(); render(); toast('Rapor yüklendi','ok');
    } else toast('Geçersiz dosya','err');
  }catch(e){ toast('Okunamadı','err'); } };
  fr.readAsText(file); document.getElementById('fileIn').value='';
}

/* ---------- Excel ---------- */
async function exportExcel(){
  if(!rep){ toast('Önce rapor açın','err'); return; }
  if(!window.ExcelJS){ toast('Excel kütüphanesi yüklenemedi','err'); return; }
  const wb=new ExcelJS.Workbook(); const m=rep.meta, pot=isPot(rep);
  const green=c=>{ c.fill={type:'pattern',pattern:'solid',fgColor:{argb:'FF0A6E4F'}}; c.font={bold:true,color:{argb:'FFFFFFFF'}}; c.alignment={vertical:'middle'}; };
  const box=c=>{ c.border={top:{style:'thin'},left:{style:'thin'},bottom:{style:'thin'},right:{style:'thin'}}; };
  // ---- Özet sayfası ----
  const ws=wb.addWorksheet('Özet');
  ws.mergeCells('A1:F1'); ws.getCell('A1').value=CATALOG[rep.type].title; ws.getCell('A1').font={bold:true,size:14};
  const bl=c=>{ c.font={bold:true}; c.alignment={vertical:'top'}; };
  const two=(lL,vL,lR,vR)=>{ const r=ws.addRow([]); const n=r.number;
    ws.getCell(n,1).value=lL; bl(ws.getCell(n,1)); ws.mergeCells(n,2,n,3); ws.getCell(n,2).value=vL; box(ws.getCell(n,1)); box(ws.getCell(n,2)); box(ws.getCell(n,3));
    if(lR!=null){ ws.getCell(n,4).value=lR; bl(ws.getCell(n,4)); ws.mergeCells(n,5,n,6); ws.getCell(n,5).value=vR; box(ws.getCell(n,4)); box(ws.getCell(n,5)); box(ws.getCell(n,6)); } };
  const wide=(l,v)=>{ const r=ws.addRow([]); const n=r.number; ws.getCell(n,1).value=l; bl(ws.getCell(n,1)); ws.mergeCells(n,2,n,6); ws.getCell(n,2).value=v||''; for(let c=1;c<=6;c++)box(ws.getCell(n,c)); };
  two('Rapor Adı',m.name||'','Sipariş/Denetim No',m.orderNo||'');
  two('Denetlenen organizasyon',(m.org&&m.org.name)||'','Müşteri',m.customer||'');
  two('Rapor Tarihi',m.date||'','Denetim Tarihi',(m.auditStart||'')+(m.auditEnd?' – '+m.auditEnd:''));
  wide('Denetçi(ler)',(rep.team||[]).map(t=>t.name).filter(Boolean).join(', '));
  wide('Denetim nedeni',m.reason||''); wide('Denetim kapsamı',m.scope||'');
  ws.addRow([]);
  if(pot){ const p=potCalc(rep);
    two('SONUÇ (Potansiyel)', POT_LBL[p.overall]+' — '+POT_STATUS[p.overall], '', '');
    ws.addRow([]);
    const hr=ws.addRow(['Öge','Ad','Yeşil','Sarı','Kırmızı','n.b.','Sonuç']); hr.eachCell(c=>{green(c);box(c);});
    rep.elements.forEach(el=>{ if(rep.excluded[el.id])return; let y=0,s=0,k=0,n=0; elQ(el).forEach(q=>{const v=rep.scores[q.id]; if(v==='yesil')y++;else if(v==='sari')s++;else if(v==='kirmizi')k++;else if(v==='nb')n++;}); const cc=k>0?'kirmizi':(s>0?'sari':(y>0?'yesil':'nb')); const row=ws.addRow([el.id,el.name,y,s,k,n,POT_LBL[cc]]); row.eachCell(c=>box(c)); });
  } else { const c=vdaCalc(rep);
    two('GENEL UYUM EG', c.EG!=null?Math.round(c.EG)+'%':'-', 'SINIF', c.cls||'-');
    ws.addRow([]);
    const hr=ws.addRow(['Öge','Ad','Cevaplanan','Ulaşılan','Maks','EP %']); hr.eachCell(cc=>{green(cc);box(cc);});
    c.elements.forEach(E=>{ const row=ws.addRow([E.el.id,E.el.name,E.excluded?'Değ. dışı':E.answered,E.excluded?'':E.achieved,E.excluded?'':E.max,E.excluded?'':(E.ep!=null?Math.round(E.ep)+'%':'-')]); row.eachCell(cc=>box(cc)); });
    const hits=c.rules.filter(r=>!r.final&&r.cls&&r.cls!=='A');
    if(hits.length){ ws.addRow([]); const dr=ws.addRow(['Aşağı çekme (downgrade):']); dr.getCell(1).font={bold:true}; hits.forEach(r=>{ const rr=ws.addRow(['',r.label+' → '+r.cls, r.why||'']); }); }
  }
  [16,46,12,12,10,12,14].forEach((w,i)=>{ const col=ws.getColumn(i+1); col.width=w; col.alignment={vertical:'top',wrapText:i===1}; });
  // ---- Sorular sayfası ----
  const wq=wb.addWorksheet('Sorular');
  const steps=pstepsArr(rep);
  const qh=wq.addRow(['Öge','No','Soru','Sonuç','Bulgular','Dahili yorumlar']); qh.eachCell(c=>{green(c);box(c);});
  rep.elements.forEach(el=>{ if(rep.excluded[el.id])return; el.subs.forEach(s=>s.qs.forEach(q=>{
    let sc;
    if(pot){ const v=rep.scores[q.id]; sc=v==null?'':(v==='nb'?'Uygulanamaz':POT_LBL[v]); }
    else { const v=qEffScore(rep,q.id); sc=(v==null)?'':(v==='nb'?'n.b.':(typeof v==='number'?+(+v).toFixed(2):v)); }
    const f=(rep.findings[q.id]||[]).join(' / ');
    const cm=(rep.comments[q.id]||[]).map(c=>'['+(c.s||'')+'] '+(c.t||'')).join(' / ');
    const row=wq.addRow([el.id,q.id+(q.star?'*':''),q.t,sc,f,cm]); row.eachCell(c=>box(c));
  })); });
  [10,10,60,12,40,40].forEach((w,i)=>{ const col=wq.getColumn(i+1); col.width=w; col.alignment={vertical:'top',wrapText:i===2||i>=4}; });
  const buf=await wb.xlsx.writeBuffer();
  const blob=new Blob([buf],{type:'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet'});
  const a=document.createElement('a'); a.href=URL.createObjectURL(blob);
  a.download='VDA63_'+((rep.meta.name)||'rapor').replace(/[^\w\-]+/g,'_')+'.xlsx'; a.click();
  toast('Excel indirildi','ok');
}
